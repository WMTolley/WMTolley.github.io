<!DOCTYPE html>
<html lang="en">
    <link href="index3.css" rel = "stylesheet" type ="text/css"/>
    <head>
        <title>Background Cutter</title>
        <link rel="icon" href="BackgroundCut.png" type="image/x-icon">
    </head>
    <body>
        <h1>Background Cutter</h1>

        <input type="file" id="fileInput">
        

        <div id="ModeInput" style="display: none;">
            <label for="SelectMode" >Choose Mode:</label>
            <select id="SelectMode">
                <option value="RemoveWhite">Remove White</option>
                <option value="RemoveBlack">Remove Black</option>
                <option value="RemoveAlpha">Remove Alpha</option>
                <option value="GreyScale">Grey Scale</option>
                <option value="BlackWhite">Black and White</option>


                <option value="Invert">Invert</option>
                <option value="ChannelBlend">Channel Blend</option>
                <option value="Delta">Delta</option>
                <option value="HueShift">Hue Shift</option>
                <option value="DualToneMix">Dual Tone Mix</option>
                <option value="ColorQuantShift">Color Quant Shift</option>
                
                
                <option value="Solarize">Solarize</option>
                <option value="PosterEdge">Poster Edge</option>
                <option value="TemperatureShift">Temperature Shift</option>
                <option value="VibranceBoost">Vibrance Boost</option>
                <option value="AutoContrast">Auto Contrast Expand</option>
                <option value="PaletteCycle">Palette Cycle</option>



                <option value="ExtractComponent">Extract Component</option>
                <option value="ChangeExposure">Change Exposure</option>
                <option value="Mix">Mix</option>
                <option value="FilterOutRange">Remove Within Range</option>
                <option value="FilterWithinRange">Remove Outside Range</option>
                
                <option value="TruePalette">True Palette</option>
                <option value="QuickPalette">Quick Palette</option>
                <option value="Simplify">Simplify</option>
                <option value="SimplifyGreyScale">Simplify GreyScale</option>

                <option value="SobelOutline">Sobel Outline</option>
                <option value="Outline">Outline</option>
                
                <option value="ResizeImage">Resize Image</option>
                <option value="AutoCenter">Auto Center</option>
            </select>
            <br>
        </div>
        <div id='ValueInput' style="display:none" onchange="previewChanged()">
            <label id="InputLabel" for="toleranceInput">Filter's Sensitivity:</label>
            <input id="toleranceInput" type="number" value="1" min="0" max="256" step="1">
        </div>
        <div id='ValueInput2' style="display:none" onchange="previewChanged()">
            <label id="InputLabel2" for="toleranceInput2">Filter's Sensitivity:</label>
            <input id="toleranceInput2" type="number" value="1" min="0" max="256" step="1">
        </div>
        <div id='ColorInput' style="display:none" onchange="previewChanged()">
            <label id="rgbLabel" for="rgbInput">Color: </label>
            <input id="rgbInput" type="color" value="#000000">
        </div>

        <div id='ColorInput2' style="display:none" onchange="previewChanged()">
            <label id="rgbLabel2" for="rgbInput2">Color: </label>
            <input id="rgbInput2" type="color" value="#000000">
        </div>
        
        <div id='ComponentDropdown' style="display:none" onchange="previewChanged()">
            <label for="SelectComponent" >Select Component:</label>
            <select id="SelectComponent">
                <option value="Red">Red</option>
                <option value="Green">Green</option>
                <option value="Blue">Blue</option>
            </select>
        </div>

        <div id='ClearWasteDropdown' style="display:none" onchange="previewChanged()">
            <label for="ClearWaste" >Clear Waste:</label>
            <select id="ClearWaste">
                <option value="True">True</option>
                <option value="False">False</option>
            </select>
        </div>

        <button id="downloadButton" style="display: none;">Download Processed Image</button>
        <br>
        <canvas id="canvas"></canvas>
        <canvas id="PreviewCanvas"></canvas>

        <script src="script.js"></script>        
    </body>

</html>
